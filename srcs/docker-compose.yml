services:

  mariadb:
    build: requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: unless-stopped
    env_file: .env
    volumes:
      - db:/var/lib/mysql
    networks:
      - inception

  wordpress:
    build: requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mariadb
    volumes:
      - wp:/var/www/html
    networks:
      - inception

  nginx:
    build: requirements/nginx
    image: nginx
    container_name: nginx
    restart: unless-stopped
    env_file: .env
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wp:/var/www/html
    networks:
      - inception

volumes:
  db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/data/db
  wp:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${HOME}/data/wp

networks:
  inception:
    driver: bridge
